name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
env:
  CARGO_INCREMENTAL: '0'
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: short
  RUSTUP_MAX_RETRIES: 10
jobs:
  build:
    name: Build on Windows
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x86_64-pc-windows-msvc]
    steps:
      - uses: actions/checkout@v4
      
      # Включаем corepack ДО setup-node, чтобы yarn был доступен
      - run: corepack enable
      - run: corepack prepare yarn@4.10.3 --activate
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: yarn.lock
      
      # Используем --immutable вместо устаревшего --frozen-lockfile
      - run: corepack yarn install --immutable
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          
      - run: corepack yarn napi build --platform --release
      
      - uses: actions/upload-artifact@v4
        with:
          name: napi-artifacts-${{ matrix.target }}
          path: |
            *.node
            index.js
            index.d.ts