<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ночная стража: установщик аддонов</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="top-bar" id="top-bar">
      <h1>Менеджер аддонов</h1>
      <button id="voice-btn" class="voice-btn" title="Открыть веб-клиент">🎤</button>
    </div>
    <div class="game-panel" id="game-panel">
      <span id="game-status">Проверка игры...</span>
      <div style="display: flex; gap: 5px;">
        <button id="change-path-btn" class="logs-btn" style="padding: 8px 10px;">Изменить путь</button>
        <button id="launch-btn" disabled>Запустить игру</button>
      </div>
    </div>
    <div class="divider" id="divider"></div>
    <div class="addons-header" id="addons-header">
      <h2>Доступные аддоны</h2>
      <button id="logs-btn" class="logs-btn">Логи</button>
    </div>
    <div class="addons-list" id="addons-list"></div>
  </div>

  <div id="webview-container" class="webview-container">
    <webview
      id="ns-webview"
      src="https://ns.fiber-gate.ru/"
      partition="persist:ns"
      allowpopups="true"
      useragent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/111.0.0.0 Safari/537.36 NightWatch/1.0"
      webpreferences="nodeIntegration=no,contextIsolation=yes,sandbox=yes,websecurity=yes"
    ></webview>
  </div>

  <div class="back-panel" id="back-panel">
    <button class="back-btn" id="back-btn">← Назад к аддонам</button>
    <div class="panel-divider"></div>
    <button class="panel-mic-btn" id="panel-mic-btn" title="Микрофон">🎤</button>
    <button class="panel-refresh-btn" id="panel-refresh-btn" title="Обновить веб-клиент (очистить кэш)">🔄</button>
    <button class="panel-settings-btn" id="panel-settings-btn" title="Настройки PTT">⚙️</button>
    <button class="panel-sounds-btn" id="panel-sounds-btn" title="Звуки">🔊</button>
  </div>

  <div class="ptt-settings-panel" id="ptt-settings-panel">
    <div class="ptt-settings-header">Настройка PTT</div>
    <div class="ptt-capture-area" id="ptt-capture-area">Нажмите комбинацию клавиш...</div>
    <div class="ptt-buttons">
      <button id="ptt-save-btn">Сохранить</button>
      <button id="ptt-cancel-btn">Отмена</button>
    </div>
  </div>

  <div class="sounds-sections-panel" id="sounds-sections-panel">
    <div class="sounds-panel-header">Загрузка звуков</div>
    <div class="sounds-panel-content" id="sounds-panel-content"></div>
    <div class="sounds-panel-buttons">
      <button id="sounds-close-btn">Закрыть</button>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
